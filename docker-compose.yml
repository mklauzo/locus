version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: locus_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-locus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-locus}
      TZ: Europe/Warsaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-locus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: locus_redis
    environment:
      TZ: Europe/Warsaw
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locus_backend
    env_file:
      - .env
    environment:
      TZ: Europe/Warsaw
      DATABASE_URL: postgresql://${POSTGRES_USER:-locus}:${POSTGRES_PASSWORD:-locus_secret}@db:5432/${POSTGRES_DB:-locus}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      bash -c "python manage.py migrate --noinput &&
               python manage.py create_admin &&
               python manage.py runserver 0.0.0.0:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locus_worker
    env_file:
      - .env
    environment:
      TZ: Europe/Warsaw
      DATABASE_URL: postgresql://${POSTGRES_USER:-locus}:${POSTGRES_PASSWORD:-locus_secret}@db:5432/${POSTGRES_DB:-locus}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A locus.celery_app worker --loglevel=info --concurrency=4

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locus_beat
    env_file:
      - .env
    environment:
      TZ: Europe/Warsaw
      DATABASE_URL: postgresql://${POSTGRES_USER:-locus}:${POSTGRES_PASSWORD:-locus_secret}@db:5432/${POSTGRES_DB:-locus}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A locus.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: locus_frontend
    environment:
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: locus_nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: locus_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Aby użyć GPU NVIDIA, odkomentuj poniższe:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama
    container_name: locus_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
